version: 2.1

jobs:
  build_test:
    docker:
      - image: cimg/python:3.12.3
    steps:
      - checkout

      - run:
          name: Install build tools
          command: pip install --upgrade pip build

      - run:
          name: Build sdist and wheel
          command: python -m build

      - run:
          name: Install package from wheel
          command: pip install dist/*.whl

      - run:
          name: Install test dependencies
          command: pip install pytest

      - run:
          name: Run tests
          command: python -m pytest --junitxml=test-reports/results.xml

      - store_test_results:
          path: test-reports

  test_pypi_publish:
    docker:
      - image: cimg/python:3.12.3
    steps:
      - checkout

      - run:
          name: Install build and publish tools
          command: pip install --upgrade pip build "twine>=6.0"

      - run:
          name: Build sdist and wheel
          command: python -m build

      - run:
          name: Check distribution
          command: twine check dist/*

      - run:
          name: Publish to TestPyPI
          command: twine upload --skip-existing -u ${TESTPY_LOGIN} -p ${TESTPY_PASSWORD} --repository testpypi dist/* --verbose

  pypi_publish:
    docker:
      - image: cimg/python:3.12.3
    steps:
      - checkout

      - run:
          name: Install build and publish tools
          command: pip install --upgrade pip build "twine>=6.0"

      - run:
          name: Build sdist and wheel
          command: python -m build

      - run:
          name: Check distribution
          command: twine check dist/*

      - run:
          name: Publish to PyPI
          command: twine upload --skip-existing dist/* --verbose

workflows:
  build_test_publish:
    jobs:
      - build_test
      - test_pypi_publish:
          requires:
            - build_test
          filters:
            branches:
              only:
                - develop
      - pypi_publish:
          requires:
            - build_test
          filters:
            branches:
              only:
                - master
